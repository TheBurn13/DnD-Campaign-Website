{% extends "base.html" %}
{% block title %}Forge Your Legend — The Compendium{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">⚔️</div>
      <h1 class="auth-title">Forge Your Legend</h1>
      <p class="auth-subtitle">Create your account, brave soul</p>
    </div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" id="username" placeholder="Choose your name" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="email" placeholder="your@email.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password"/>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input class="form-input" type="password" id="password2" placeholder="Repeat your secret word" autocomplete="new-password"/>
    </div>

    <button class="btn btn-primary" style="width:100%" id="registerBtn" onclick="doRegister()">
      Begin the Journey 🐉
    </button>

    <div class="auth-footer">
      Already sworn in? <a href="/login">Return to the realm</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
async function doRegister() {
  const btn = document.getElementById('registerBtn');
  const username = document.getElementById('username').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const password2= document.getElementById('password2').value;

  if (!username || !email || !password) { showToast('Please fill in all fields'); return; }
  if (password !== password2) { showToast('Passwords do not match'); return; }
  if (password.length < 6) { showToast('Password must be at least 6 characters'); return; }

  btn.disabled = true;
  btn.textContent = 'Creating account...';
  try {
    await api('POST', '/api/register', { username, email, password });
    window.location.href = '/dashboard';
  } catch (e) {
    showToast(e.message);
    btn.disabled = false;
    btn.textContent = 'Begin the Journey 🐉';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doRegister();
});
</script>
{% endblock %}
