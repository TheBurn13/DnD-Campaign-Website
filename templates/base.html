<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}The Compendium{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css"/>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="vignette"></div>
  <div class="parchment-overlay"></div>

  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="brand-rune">⚔</span>
        <span class="brand-text">The Compendium</span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="/dashboard" class="nav-link" id="navDashboard" style="display:none">My Characters</a>
        <span class="nav-user" id="navUser"></span>
        <a href="/logout" class="nav-link nav-logout" id="navLogout" style="display:none">Depart</a>
        <a href="/login" class="nav-link nav-cta" id="navLogin">Enter</a>
      </div>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="footer-ornament">⋆ ✦ ⋆</div>
    <p>May your dice roll true</p>
  </footer>

  <div class="toast" id="toast"></div>

  <script src="/static/js/main.js"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
